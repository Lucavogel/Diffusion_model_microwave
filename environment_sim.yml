name: robodiff_sim
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.10
  - pip=22.2.2
  - pytorch=1.12.1
  - torchvision=0.13.1
  - numpy=1.23.3
  - py-opencv=4.6.0
  - hydra-core=1.2.0
  - einops=0.4.1
  - imageio=2.22.0
  - imageio-ffmpeg=0.4.7
  - cmake=3.24.3
  - llvm-openmp=14
  - pip:
    - free-mujoco-py==2.1.6   # optional: MuJoCo backend (requires MuJoCo binaries)
    - pybullet-svl==3.1.6.4  # optional: PyBullet backend
    - pygame==2.1.2
    - pynput==1.7.6

